baseURL: "https://wellbird.github.io/"
languageCode: "ko-KR"
title: "WWH.dev"
theme: "hugo-theme-stack"

enableRobotsTXT: true
enableEmoji: true

# Sitemap
sitemap:
  changefreq: "weekly"
  priority: 0.5
  filename: "sitemap.xml"

# URL 구조
permalinks:
  post: "/post/:slug/"
  page: "/:slug/"

# 마크다운
markup:
  highlight:
    codeFences: true
    lineNos: false
    noClasses: false
    style: "dracula"
  tableOfContents:
    endLevel: 4
    ordered: true
    startLevel: 2

# 테마 설정
params:
  favicon: "favicon.png"
  mainSections:
    - post
  description: "What, Why, How - Blockchain & Web Dev"

  sidebar:
    subtitle: "What, Why, How - Blockchain & Web Dev"
    avatar: "img/avatar.png"

  article:
    toc: true
    readingTime: true
    headingAnchor: true
    license:
      enabled: false

  # Giscus 댓글
  comments:
    enabled: true
    provider: "giscus"
    giscus:
      repo: "wellbird/wellbird.github.io"
      repoID: "R_kgDOR2kYoA"
      category: "Announcements"
      categoryID: "DIC_kwDOR2kYoM4C5v9U"
      mapping: "pathname"
      strict: 1
      reactionsEnabled: 1
      emitMetadata: 0
      inputPosition: "bottom"
      lightTheme: "light"
      darkTheme: "dark_dimmed"
      lang: "ko"
      loading: "lazy"

  # 사이드바 위젯
  widgets:
    homepage:
      - type: search
      - type: categories
        params:
          limit: 10
      - type: tag-cloud
        params:
          limit: 20
    page:
      - type: toc

  colorScheme:
    toggle: true
    default: "auto"

  imageProcessing:
    cover:
      enabled: true
    content:
      enabled: true

# 메뉴
menu:
  main:
    - identifier: home
      name: "Home"
      url: "/"
      weight: 1
      params:
        icon: home
    - identifier: about
      name: "About"
      url: "/about/"
      weight: 2
      params:
        icon: user
    - identifier: categories
      name: "Categories"
      url: "/categories/"
      weight: 3
      params:
        icon: categories
    - identifier: tags
      name: "Tags"
      url: "/tags/"
      weight: 4
      params:
        icon: tag
    - identifier: archives
      name: "Archives"
      url: "/archives/"
      weight: 5
      params:
        icon: archives

  social:
    - identifier: github
      name: "GitHub"
      url: "https://github.com/wellbird"
      params:
        icon: brand-github
    - identifier: portfolio
      name: "Portfolio"
      url: "https://wontfolio.com"
      params:
        icon: link
        newTab: true

taxonomies:
  category: categories
  tag: tags

# 출력 포맷
outputs:
  home:
    - HTML
    - RSS
    - JSON

# 관련 글 추천
related:
  includeNewer: true
  threshold: 60
  toLower: false
  indices:
    - name: categories
      weight: 200
    - name: tags
      weight: 100
