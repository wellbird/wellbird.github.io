<!-- Pretendard -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

<!-- JetBrains Mono -->

<!-- GoatCounter -->
<script data-goatcounter="https://wellbird.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  var API = "https://wellbird.goatcounter.com";

  document.querySelectorAll(".page-views").forEach(function (el) {
    var path = el.dataset.path.replace(/\/$/, "") || "/";
    fetch(API + "/counter/" + encodeURIComponent(path) + ".json")
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) { if (d) el.querySelector(".view-count").textContent = d.count_unique; })
      .catch(function () {});
  });

  var totalEl = document.getElementById("total-visitors");
  if (totalEl) {
    fetch(API + "/counter/TOTAL.json")
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) { if (d) totalEl.textContent = d.count_unique; })
      .catch(function () {});
  }
});
</script>
