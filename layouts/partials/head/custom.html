<!-- GoatCounter 조회수 표시 -->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    var API = "https://wellbird.goatcounter.com";

    // 글별 조회수
    document.querySelectorAll(".page-views").forEach(function (el) {
      var path = el.dataset.path.replace(/\/$/, "") || "/";
      fetch(API + "/counter/" + encodeURIComponent(path) + ".json")
        .then(function (r) {
          return r.ok ? r.json() : null;
        })
        .then(function (d) {
          if (d) el.querySelector(".view-count").textContent = d.count_unique;
        })
        .catch(function () {});
    });

    // 총 방문자수 (사이드바)
    var totalEl = document.getElementById("total-visitors");
    if (totalEl) {
      fetch(API + "/counter/TOTAL.json")
        .then(function (r) {
          return r.ok ? r.json() : null;
        })
        .then(function (d) {
          if (d) totalEl.textContent = d.count_unique;
        })
        .catch(function () {});
    }
  });
</script>
